<svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Finara — Accounting ERP (White)</title>
  <desc>Finara Accounting ERP white logo for use on dark backgrounds</desc>

  <!-- Icon background (translucent white) -->
  <rect x="10" y="14" width="112" height="112" rx="22" fill="rgba(255,255,255,0.15)"/>

  <!-- Bars -->
  <rect x="32" y="87" width="20" height="27" rx="4" fill="white"/>
  <rect x="58" y="67" width="20" height="47" rx="4" fill="white"/>
  <rect x="84" y="41" width="20" height="73" rx="4" fill="white"/>

  <!-- Trend line -->
  <polyline points="42,87 68,67 94,41" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Growth dot -->
  <circle cx="94" cy="41" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="94" cy="41" r="3" fill="white"/>

  <!-- Wordmark -->
  <text x="142" y="82" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-2">Finara</text>

  <!-- Separator -->
  <rect x="142" y="91" width="210" height="2" rx="1" fill="rgba(255,255,255,0.4)"/>

  <!-- Tagline -->
  <text x="143" y="112" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="rgba(255,255,255,0.6)" letter-spacing="4">ACCOUNTING · ERP</text>
</svg>
