<svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Finara — Accounting ERP</title>
  <desc>Finara Accounting ERP full horizontal logo</desc>
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="10" y="14" width="112" height="112" rx="22" fill="url(#iconGrad)"/>

  <!-- Ascending bar chart (growth motif) -->
  <rect x="32" y="87" width="20" height="27" rx="4" fill="white"/>
  <rect x="58" y="67" width="20" height="47" rx="4" fill="white"/>
  <rect x="84" y="41" width="20" height="73" rx="4" fill="white"/>

  <!-- Trend line -->
  <polyline points="42,87 68,67 94,41" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Growth dot accent -->
  <circle cx="94" cy="41" r="6" fill="#60a5fa"/>
  <circle cx="94" cy="41" r="3" fill="white"/>

  <!-- Wordmark "Finara" -->
  <text x="142" y="82" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" fill="#1e3a8a" letter-spacing="-2">Finara</text>

  <!-- Accent separator line -->
  <rect x="142" y="91" width="210" height="2.5" rx="1.25" fill="url(#accentLine)"/>

  <!-- Tagline -->
  <text x="143" y="112" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#64748b" letter-spacing="4">ACCOUNTING · ERP</text>
</svg>
